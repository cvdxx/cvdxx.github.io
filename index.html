<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electrical Pit Test Practice</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #047857;
      --error: #b91c1c;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 860px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: 0.2px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #eef2ff;
      overflow: hidden;
      margin: 10px 0 18px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      transition: width 220ms ease;
    }

    .question {
      font-size: 1.14rem;
      line-height: 1.45;
      margin-bottom: 14px;
      font-weight: 650;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 13px;
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease;
    }

    .option:hover {
      border-color: #c7d2fe;
      background: #f8faff;
    }

    .option input { margin-top: 2px; }

    .feedback {
      border-radius: 12px;
      padding: 12px 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
      font-size: 0.97rem;
    }

    .feedback.ok {
      display: block;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: var(--success);
    }

    .feedback.bad {
      display: block;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--error);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 650;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover { background: var(--accent-hover); }

    .secondary {
      background: #eef2ff;
      color: #1e3a8a;
    }

    .secondary:hover { background: #e0e7ff; }

    .secondary:disabled, .primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .result {
      display: none;
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .result h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }

    .small {
      color: var(--muted);
      margin: 4px 0 0;
    }

    .hint {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0 0 10px;
    }

    .match-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .match-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .match-row select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
      background: #fff;
      color: var(--text);
    }

    .drag-list {
      list-style: none;
      margin: 0 0 18px;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .drag-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      cursor: grab;
      user-select: none;
    }

    .drag-item.dragging {
      opacity: 0.45;
    }

    .drag-item.over {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .drag-category-container {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 2fr);
      gap: 16px;
      margin-bottom: 18px;
      align-items: flex-start;
    }

    .item-pool {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #f9fafb;
    }

    .item-pool h3 {
      margin: 0 0 8px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .drag-item-cat {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
      cursor: grab;
      user-select: none;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .drag-item-cat.dragging {
      opacity: 0.5;
    }

    .categories {
      display: grid;
      gap: 10px;
    }

    .category-box {
      border: 1px dashed #cbd5f5;
      border-radius: 12px;
      padding: 10px 10px 6px;
      min-height: 72px;
      background: #f9fafb;
    }

    .category-box h4 {
      margin: 0 0 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .category-box.over {
      border-style: solid;
      border-color: #60a5fa;
      background: #eff6ff;
    }

    .multimeter {
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 14px;
      background: #f9fafb;
      margin-bottom: 18px;
    }

    .dial {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .dial-option {
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 0.88rem;
      cursor: pointer;
    }

    .dial-option.selected {
      border-color: #2563eb;
      background: #dbeafe;
      color: #1e3a8a;
    }

    .main-layout {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 20px;
      align-items: flex-start;
    }

    .main-content {
      min-width: 0;
    }

    .sidebar {
      width: 80px;
      border-right: 1px solid var(--border);
      padding-right: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .sidebar-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .sidebar-btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f9fafb;
      font-size: 0.8rem;
      padding: 4px 0;
      cursor: pointer;
      text-align: center;
      color: var(--muted);
    }

    .sidebar-btn.active {
      border-color: #2563eb;
      background: #dbeafe;
      color: #1e3a8a;
      font-weight: 600;
    }

    .sidebar-btn.answered-correct {
      border-color: #16a34a;
      background: #dcfce7;
      color: #166534;
    }

    .sidebar-btn.answered-wrong {
      border-color: #b91c1c;
      background: #fee2e2;
      color: #7f1d1d;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <h1>Electrical Pit Test Practice</h1>
      <div class="meta" id="meta">Question 1 / 23</div>
    </div>

    <div style="margin-bottom: 12px; text-align: right;">
      <button class="secondary" type="button" onclick="window.location.href='frc-pit-review.html'">
        Go to Programming Pit Review
      </button>
    </div>

    <div class="progress-wrap" aria-hidden="true">
      <div class="progress" id="progress"></div>
    </div>

    <div class="main-layout">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-content">
        <section id="quizSection">
          <div class="question" id="question"></div>
          <div class="options" id="options"></div>
          <div class="feedback" id="feedback"></div>

          <div class="actions">
            <button class="primary" id="submitBtn">Check Answer</button>
            <button class="secondary" id="nextBtn" disabled>Next</button>
          </div>
        </section>

        <section class="result" id="resultSection">
          <h2 id="resultTitle"></h2>
          <p class="small" id="resultText"></p>
          <div class="actions" style="margin-top: 12px;">
            <button class="primary" id="restartBtn">Practice Again</button>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const questions = [
      {
        type: 'mcq',
        question: 'Before a match, a fresh battery should usually read:',
        options: ['>12.8V @ 18A and <0.02 ohms', '11.5V @ 0A and 0.04 ohms', '12.0V @ 40A and 0.08 ohms', 'Any value is fine if the charger says done'],
        answer: 0,
        explanation: 'Comp-ready battery target is over 12.8V at 18A and less than 0.02 ohms internal resistance.'
      },
      {
        type: 'mcq',
        question: 'Safe battery insertion orientation in the robot is:',
        options: ['Upside down so it cannot slide out', 'Sideways with the positive wire on top', 'Sideways with negative wire on top', 'Vertical with terminals facing down'],
        answer: 1,
        explanation: 'Team standard is sideways insertion with the positive lead on top.'
      },
      {
        type: 'mcq',
        question: 'How do you quickly use a battery beak?',
        options: ['Plug in, press once, check color only', 'Plug in and hold for 10 seconds', 'Plug in connector, press button twice, then read voltage and resistance', 'Connect to PDH first, then read battery beak'],
        answer: 2,
        explanation: 'Plug into the battery connector, press the button twice, then read voltage and internal resistance.'
      },
      {
        type: 'mcq',
        question: 'A battery reads V2 = 10.795V @ 18A and Rint = 0.040 ohms. Competition ready?',
        options: ['Yes, because resistance is all that matters', 'No, voltage is too low (and resistance is high)', 'Yes, if used for auto only', 'No, but only because 0A value is missing'],
        answer: 1,
        explanation: 'Reject it first because voltage is too low; resistance is also high.'
      },
      {
        type: 'mcq',
        question: 'CAN wire colors and meaning are:',
        options: ['Green high, yellow low', 'Yellow high, green low', 'Red high, black low', 'Blue high, white low'],
        answer: 1,
        explanation: 'Yellow is CAN high and green is CAN low in your guide.'
      },
      {
        type: 'mcq',
        question: 'Main robot CAN topology (non-CANivore loop) is best described as:',
        options: ['Star from roboRIO to each device', 'Daisy-chain starting at roboRIO and ending at PDH', 'Ring that returns to roboRIO', 'Parallel bus ending at radio'],
        answer: 1,
        explanation: 'Your notes specify daisy-chain from roboRIO through devices to PDH.'
      },
      {
        type: 'mcq',
        question: 'The separate CANivore loop should end with:',
        options: ['A 40A breaker', 'A ferrule connector', 'A 120-ohm resistor', 'A Limelight'],
        answer: 2,
        explanation: 'The CANivore loop is terminated with a 120Ω resistor.'
      },
      {
        type: 'mcq',
        question: 'What connectors typically connect motor controllers to motors?',
        options: ['Ferrules', 'Anderson Powerpole connectors', 'RJ45 connectors', 'BNC connectors'],
        answer: 1,
        explanation: 'Controller-to-motor connections use Anderson Powerpole connectors.'
      },
      {
        type: 'mcq',
        question: 'What connector type goes into PDH screw terminals?',
        options: ['Ferrules', 'Powerpoles', 'XT60', 'Bullet connectors'],
        answer: 0,
        explanation: 'PDH screw terminals should use ferrules for proper clamp contact.'
      },
      {
        type: 'mcq',
        question: 'To check if a chassis is energized by a 12V short, a multimeter should be set to:',
        options: ['DC 20V range', 'DC 2V range', 'AC 200V range', '20mA current range'],
        answer: 0,
        explanation: 'A 12V fault is best checked on the DC 20V range.'
      },
      {
        type: 'mcq',
        question: 'Which wire is larger: 12 AWG or 18 AWG?',
        options: ['18 AWG', '12 AWG', 'Same size', 'Depends on insulation color'],
        answer: 1,
        explanation: 'In AWG, smaller number means larger conductor.'
      },
      {
        type: 'mcq',
        question: 'What gauge is used for battery-breaker-PDH wiring?',
        options: ['18 AWG', '12 AWG', '10 AWG', '6 AWG'],
        answer: 3,
        explanation: 'Main high-current battery path uses 6 AWG.'
      },
      {
        type: 'mcq',
        question: 'What gauge is used for Krakens specifically?',
        options: ['18 AWG', '12 AWG', '10 AWG', '6 AWG'],
        answer: 2,
        explanation: 'Krakens are wired with 10 AWG in your standard.'
      },
      {
        type: 'mcq',
        question: 'What gauge is used for other motors?',
        options: ['12 AWG', '10 AWG', '18 AWG', '22 AWG'],
        answer: 0,
        explanation: 'Other motors use 12 AWG.'
      },
      {
        type: 'mcq',
        question: 'What gauge is used for CANCoders, roboRIO, and radio power?',
        options: ['22 AWG', '18 AWG', '12 AWG', '10 AWG'],
        answer: 1,
        explanation: 'Low-power device feeds use 18 AWG.'
      },
      {
        type: 'mcq',
        question: 'What gauge is used for CAN wires?',
        options: ['22 AWG', '18 AWG', '12 AWG', '6 AWG'],
        answer: 0,
        explanation: 'CAN wiring uses 22 AWG.'
      },
      {
        type: 'mcq',
        question: 'Two ways to check if a fuse is blown are:',
        options: ['Smell test and battery beak', 'Continuity test and visual check for broken element', 'Voltage drop and tug test', 'Current clamp and LED color'],
        answer: 1,
        explanation: 'Use multimeter continuity and visual element inspection.'
      },
      {
        type: 'mcq',
        question: 'When crimping a ferrule, what part do you crimp?',
        options: ['The plastic sleeve', 'The metal part', 'Half metal and half insulation', 'Only the wire strands'],
        answer: 1,
        explanation: 'You crimp the metal barrel, not the plastic collar.'
      },
      {
        type: 'mcq',
        question: 'How is a CANivore connected to the roboRIO?',
        options: ['Ethernet cable', 'PWM cable', 'USB-C cable', 'DIO cable'],
        answer: 2,
        explanation: 'Connection is USB-C from roboRIO to CANivore.'
      },
      {
        type: 'tf',
        question: 'True or False: PDH voltage display can replace a battery beak for battery health checks.',
        answer: false,
        explanation: 'False. PDH voltage is at current robot draw; battery beak uses fixed test loads and comparable battery health values.'
      },
      {
        type: 'tf',
        question: 'True or False: Most sensor wires plug into roboRIO DIO ports.',
        answer: true,
        explanation: 'True. Your guide calls out DIO as the common sensor connection area.'
      },
      {
        type: 'matching',
        question: 'Match each wire gauge to its typical use.',
        leftItems: ['6 AWG', '10 AWG', '18 AWG', '22 AWG'],
        rightOptions: ['Battery/Breaker/PDH', 'Krakens', 'CANCoders/RIO/Radio power', 'CAN wires'],
        answerMap: {
          '6 AWG': 'Battery/Breaker/PDH',
          '10 AWG': 'Krakens',
          '18 AWG': 'CANCoders/RIO/Radio power',
          '22 AWG': 'CAN wires'
        },
        explanation: 'These pairings come directly from your wiring standards.'
      },
      {
        type: 'dragdrop',
        question: 'Drag and drop to put Anderson connector assembly steps in the correct order.',
        items: ['Strip wire to contact crimp length', 'Crimp contact onto stripped wire', 'Slide contact into housing', 'Pull test'],
        correctOrder: ['Strip wire to contact crimp length', 'Crimp contact onto stripped wire', 'Slide contact into housing', 'Pull test'],
        explanation: 'Correct order is prep wire, crimp, insert into housing, then verify with pull test.'
      },
      {
        type: 'checkbox',
        question: 'What sensors can be found on the robot?',
        options: [
          'Pigeon 2.0',
          'Limit Switch',
          'NavX-MXP',
          'Color Sensor V3',
          'Ultrasonic Sensor',
          'CANcoder (Encoder)',
          'Beam-break Sensor',
          'TalonFX',
          'Limelight'
        ],
        answer: [0, 1, 5, 6, 7],
        explanation: 'The correct sensors are CANcoder, TalonFX, Limelight, Pigeon 2.0, and Limit Switch. The others are valid FRC sensors but not on this specific robot.'
      },
      {
        type: 'mcq',
        question: 'What does the robot status light plug into?',
        options: [
          'The RSL port on the RoboRio',
          'A DIO port on the RoboRio',
          'The VRM',
          'The PDH'
        ],
        answer: 0,
        explanation: 'The Robot Signal Light (RSL) plugs into the dedicated RSL port on the RoboRio.'
      },
      {
        type: 'dragdrop-category',
        question: '(excluding the drivetrain) How many motors does each subsystem have? Motor types?',
        categories: ['Hopper/Intake', 'Climb', 'Indexer/Shooter'],
        items: [
          'Falcon 500', 'Falcon 500', 'Falcon 500', 'Falcon 500', 'Falcon 500', 'Kraken x44', 'Kraken x60', 'Kraken x60'
        ],
        answer: {
          'Hopper/Intake': { 'Falcon 500': 3, 'Kraken x44': 0, 'Kraken x60': 0 },
          'Climb': { 'Falcon 500': 1, 'Kraken x44': 0, 'Kraken x60': 0 },
          'Indexer/Shooter': { 'Falcon 500': 1, 'Kraken x44': 1, 'Kraken x60': 2 }
        },
        explanation: 'Hopper/Intake has 3 Falcon 500s. The Climb has 1 Falcon 500. The Indexer/Shooter has 1 Kraken x44, 2 Kraken x60s, and 1 Falcon 500.'
      },
      {
        type: 'mcq',
        question: 'A. The team suspects there’s a short on the robot that is causing the chassis to be energized. What tool would you use to check the voltage of the chassis?',
        options: ['Multimeter', 'Wrench', 'Battery Beak', 'Spool of wire'],
        answer: 0,
        explanation: 'A multimeter is used to measure voltage.'
      },
      {
        type: 'interactive-multimeter',
        question: 'B. What setting would you select on the tool?',
        options: ['200V', '2V', '20V', '20mA', '2A'],
        answer: '20V',
        explanation: 'DC 20V will be the correct range for a potential 12V short.'
      }
    ];

    let current = 0;
    let score = 0;
    let locked = false;
    let dragOrder = [];
    let draggingIndex = null;
    let draggingElement = null;

    const meta = document.getElementById('meta');
    const progress = document.getElementById('progress');
    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const submitBtn = document.getElementById('submitBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resultSection = document.getElementById('resultSection');
    const resultTitle = document.getElementById('resultTitle');
    const resultText = document.getElementById('resultText');
    const restartBtn = document.getElementById('restartBtn');
    const quizSection = document.getElementById('quizSection');
    const sidebarEl = document.getElementById('sidebar');

    const questionResults = Array(questions.length).fill(null);

    function shuffled(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildSidebar() {
      if (!sidebarEl) return;
      sidebarEl.innerHTML = '';

      const title = document.createElement('div');
      title.className = 'sidebar-title';
      title.textContent = 'Questions';
      sidebarEl.appendChild(title);

      const list = document.createElement('div');
      list.className = 'sidebar-list';

      questions.forEach((_, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'sidebar-btn';
        btn.textContent = String(index + 1);
        btn.dataset.index = String(index);
        btn.addEventListener('click', () => {
          current = index;
          renderQuestion();
        });
        list.appendChild(btn);
      });

      sidebarEl.appendChild(list);
    }

    function updateSidebar() {
      if (!sidebarEl) return;
      const buttons = sidebarEl.querySelectorAll('.sidebar-btn');
      buttons.forEach((btn) => {
        const idx = Number(btn.dataset.index);
        btn.classList.toggle('active', idx === current);

        btn.classList.remove('answered-correct', 'answered-wrong');
        if (questionResults[idx] === true) {
          btn.classList.add('answered-correct');
        } else if (questionResults[idx] === false) {
          btn.classList.add('answered-wrong');
        }
      });
    }

    function renderMcqOrTf(q) {
      const isTf = q.type === 'tf';
      const choices = isTf ? ['True', 'False'] : q.options;
      const hint = document.createElement('p');
      hint.className = 'hint';
      hint.textContent = isTf ? 'Choose True or False.' : 'Choose one answer.';
      optionsEl.appendChild(hint);

      if (isTf) {
        choices.forEach((optionText, index) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = 'answer';
          input.value = String(index); // 0 = True, 1 = False

          const span = document.createElement('span');
          span.textContent = optionText;

          label.appendChild(input);
          label.appendChild(span);
          optionsEl.appendChild(label);
        });
      } else {
        const indices = shuffled(choices.map((_, i) => i));
        indices.forEach((originalIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = 'answer';
          // store original index so grading works after shuffle
          input.value = String(originalIndex);

          const span = document.createElement('span');
          span.textContent = choices[originalIndex];

          label.appendChild(input);
          label.appendChild(span);
          optionsEl.appendChild(label);
        });
      }
    }

    function renderCheckbox(q) {
      const hint = document.createElement('p');
      hint.className = 'hint';
      hint.textContent = 'Select all that apply.';
      optionsEl.appendChild(hint);

      q.options.forEach((optionText, index) => {
        const label = document.createElement('label');
        label.className = 'option';

        const input = document.createElement('input');
        input.type = 'checkbox';
        input.name = 'answer';
        input.value = String(index);

        const span = document.createElement('span');
        span.textContent = optionText;

        label.appendChild(input);
        label.appendChild(span);
        optionsEl.appendChild(label);
      });
    }

    function renderMatching(q) {
      const hint = document.createElement('p');
      hint.className = 'hint';
      hint.textContent = 'Match each left item to one right-side choice.';
      optionsEl.appendChild(hint);

      const grid = document.createElement('div');
      grid.className = 'match-grid';

      q.leftItems.forEach((leftItem) => {
        const row = document.createElement('div');
        row.className = 'match-row';

        const left = document.createElement('div');
        left.textContent = leftItem;

        const select = document.createElement('select');
        select.dataset.left = leftItem;

        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = 'Select a match';
        select.appendChild(placeholder);

        shuffled(q.rightOptions).forEach((opt) => {
          const option = document.createElement('option');
          option.value = opt;
          option.textContent = opt;
          select.appendChild(option);
        });

        row.appendChild(left);
        row.appendChild(select);
        grid.appendChild(row);
      });

      optionsEl.appendChild(grid);
    }

    function renderDragDrop(q) {
      const hint = document.createElement('p');
      hint.className = 'hint';
      hint.textContent = 'Drag items to reorder them from first step to last.';
      optionsEl.appendChild(hint);

      dragOrder = shuffled(q.items);

      const list = document.createElement('ul');
      list.className = 'drag-list';
      list.id = 'dragList';
      optionsEl.appendChild(list);
      drawDragItems();
    }

    function renderDragDropCategory(q) {
        const hint = document.createElement('p');
        hint.className = 'hint';
        hint.textContent = 'Drag the motors into the correct subsystem category.';
        optionsEl.appendChild(hint);

        const container = document.createElement('div');
        container.className = 'drag-category-container';

        const itemPool = document.createElement('div');
        itemPool.className = 'item-pool';
        itemPool.innerHTML = '<h3>Motors</h3>';
        shuffled(q.items).forEach(item => {
          const el = document.createElement('div');
          el.className = 'drag-item-cat';
          el.textContent = item;
          el.draggable = true;
          el.addEventListener('dragstart', (e) => {
            draggingElement = el;
            el.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
          });
          el.addEventListener('dragend', () => {
            if (draggingElement === el) draggingElement = null;
            el.classList.remove('dragging');
          });
          itemPool.appendChild(el);
        });

        const categoriesContainer = document.createElement('div');
        categoriesContainer.className = 'categories';

        q.categories.forEach(cat => {
            const catEl = document.createElement('div');
            catEl.className = 'category-box';
            catEl.innerHTML = `<h4>${cat}</h4>`;
            catEl.dataset.category = cat;

            catEl.addEventListener('dragover', (e) => {
                e.preventDefault();
                catEl.classList.add('over');
            });
            catEl.addEventListener('dragleave', () => {
                catEl.classList.remove('over');
            });
            catEl.addEventListener('drop', (e) => {
                e.preventDefault();
                catEl.classList.remove('over');
                if (draggingElement) {
                    catEl.appendChild(draggingElement);
                }
            });
            categoriesContainer.appendChild(catEl);
        });

        itemPool.addEventListener('dragover', (e) => {
          e.preventDefault();
        });

        itemPool.addEventListener('drop', (e) => {
          e.preventDefault();
          if (draggingElement) {
            itemPool.appendChild(draggingElement);
          }
        });

        container.appendChild(itemPool);
        container.appendChild(categoriesContainer);
        optionsEl.appendChild(container);
    }

    function renderInteractiveMultimeter(q) {
        const hint = document.createElement('p');
        hint.className = 'hint';
        hint.textContent = 'Click on the correct setting on the multimeter dial.';
        optionsEl.appendChild(hint);

        const multimeterContainer = document.createElement('div');
        multimeterContainer.className = 'multimeter';
        // This would be a simplified representation. A real implementation might use SVG.
        const dial = document.createElement('div');
        dial.className = 'dial';
        
        q.options.forEach(opt => {
            const optEl = document.createElement('div');
            optEl.className = 'dial-option';
            optEl.textContent = opt;
            optEl.dataset.value = opt;
            optEl.addEventListener('click', () => {
                if (locked) return;
                document.querySelectorAll('.dial-option').forEach(el => el.classList.remove('selected'));
                optEl.classList.add('selected');
            });
            dial.appendChild(optEl);
        });

        multimeterContainer.appendChild(dial);
        optionsEl.appendChild(multimeterContainer);
    }

    function drawDragItems() {
      const list = document.getElementById('dragList');
      if (!list) return;
      list.innerHTML = '';

      dragOrder.forEach((itemText, index) => {
        const li = document.createElement('li');
        li.className = 'drag-item';
        li.draggable = true;
        li.dataset.index = String(index);
        li.textContent = `${index + 1}. ${itemText}`;

        li.addEventListener('dragstart', () => {
          draggingIndex = index;
          li.classList.add('dragging');
        });

        li.addEventListener('dragend', () => {
          li.classList.remove('dragging');
          draggingIndex = null;
          document.querySelectorAll('.drag-item.over').forEach((el) => el.classList.remove('over'));
        });

        li.addEventListener('dragover', (event) => {
          event.preventDefault();
          li.classList.add('over');
        });

        li.addEventListener('dragleave', () => {
          li.classList.remove('over');
        });

        li.addEventListener('drop', (event) => {
          event.preventDefault();
          li.classList.remove('over');
          const targetIndex = Number(li.dataset.index);
          if (draggingIndex === null || targetIndex === draggingIndex) return;
          const moved = dragOrder.splice(draggingIndex, 1)[0];
          dragOrder.splice(targetIndex, 0, moved);
          drawDragItems();
        });

        list.appendChild(li);
      });
    }

    function renderQuestion() {
      const q = questions[current];
      meta.textContent = `Question ${current + 1} / ${questions.length}`;
      progress.style.width = `${((current + 1) / questions.length) * 100}%`;
      questionEl.textContent = q.question;
      optionsEl.innerHTML = '';
      feedbackEl.className = 'feedback';
      feedbackEl.textContent = '';
      submitBtn.disabled = false;
      nextBtn.disabled = true;
      locked = false;

      if (q.type === 'matching') {
        renderMatching(q);
      } else if (q.type === 'dragdrop') {
        renderDragDrop(q);
      } else if (q.type === 'checkbox') {
        renderCheckbox(q);
      } else if (q.type === 'dragdrop-category') {
        renderDragDropCategory(q);
      } else if (q.type === 'interactive-multimeter') {
        renderInteractiveMultimeter(q);
      } else {
        renderMcqOrTf(q);
      }

      updateSidebar();
    }

    function gradeQuestion(q) {
      if (q.type === 'mcq') {
        const checked = document.querySelector('input[name="answer"]:checked');
        if (!checked) return { answered: false };
        const choice = Number(checked.value);
        return { answered: true, correct: choice === q.answer, correctText: q.options[q.answer] };
      }

      if (q.type === 'tf') {
        const checked = document.querySelector('input[name="answer"]:checked');
        if (!checked) return { answered: false };
        const choice = Number(checked.value) === 0;
        const correctText = q.answer ? 'True' : 'False';
        return { answered: true, correct: choice === q.answer, correctText };
      }

      if (q.type === 'checkbox') {
        const checked = Array.from(document.querySelectorAll('input[name="answer"]:checked')).map(el => Number(el.value));
        if (checked.length === 0) return { answered: false };
        const correct = q.answer.every(val => checked.includes(val)) && q.answer.length === checked.length;
        const correctText = q.options.filter((_, i) => q.answer.includes(i)).join(', ');
        return { answered: true, correct, correctText };
      }

      if (q.type === 'matching') {
        const selects = Array.from(optionsEl.querySelectorAll('select[data-left]'));
        if (selects.some((sel) => !sel.value)) return { answered: false };
        const correct = selects.every((sel) => q.answerMap[sel.dataset.left] === sel.value);
        return { answered: true, correct, correctText: 'all matches aligned' };
      }

      if (q.type === 'dragdrop') {
        const correct = q.correctOrder.every((step, index) => dragOrder[index] === step);
        return { answered: true, correct, correctText: q.correctOrder.join(' → ') };
      }

      if (q.type === 'dragdrop-category') {
        const categoryBoxes = optionsEl.querySelectorAll('.category-box');
        let allCorrect = true;

        for (const box of categoryBoxes) {
          const category = box.dataset.category;
          const requirement = q.answer[category];
          if (!requirement) {
            allCorrect = false;
            break;
          }

          const items = Array.from(box.querySelectorAll('.drag-item-cat')).map(el => el.textContent.trim());
          const counts = {};
          items.forEach((label) => {
            counts[label] = (counts[label] || 0) + 1;
          });

          const requiredTotal = Object.values(requirement).reduce((sum, n) => sum + n, 0);
          if (items.length !== requiredTotal) {
            allCorrect = false;
            break;
          }

          for (const [label, needed] of Object.entries(requirement)) {
            if ((counts[label] || 0) !== needed) {
              allCorrect = false;
              break;
            }
          }

          if (!allCorrect) break;
        }

        return { answered: true, correct: allCorrect, correctText: 'Motors correctly categorized.' };
      }

      if (q.type === 'interactive-multimeter') {
        const selected = document.querySelector('.dial-option.selected');
        if (!selected) return { answered: false };
        const value = selected.dataset.value;
        return { answered: true, correct: value === q.answer, correctText: q.answer };
      }

      return { answered: false };
    }

    submitBtn.addEventListener('click', () => {
      if (locked) return;

      const q = questions[current];
      const result = gradeQuestion(q);

      if (!result.answered) {
        feedbackEl.className = 'feedback bad';
        feedbackEl.textContent = 'Complete this question before checking your answer.';
        return;
      }

      locked = true;
      submitBtn.disabled = true;
      nextBtn.disabled = false;

      questionResults[current] = result.correct;
      updateSidebar();

      if (result.correct) {
        score += 1;
        feedbackEl.className = 'feedback ok';
        feedbackEl.textContent = `✅ Correct. ${q.explanation}`;
      } else {
        feedbackEl.className = 'feedback bad';
        feedbackEl.textContent = `❌ Not quite. Correct answer: ${result.correctText}. Why: ${q.explanation}`;
        if (q.type === 'mcq' || q.type === 'tf') {
          const options = optionsEl.querySelectorAll('.option');
          options.forEach((label) => {
            const input = label.querySelector('input');
            if (!input) return;

            if (q.type === 'mcq') {
              if (Number(input.value) === q.answer) {
                label.style.background = '#dcfce7';
                label.style.borderColor = '#4ade80';
              }
            } else if (q.type === 'tf') {
              const isTrueLabel = Number(input.value) === 0;
              const shouldHighlight = (q.answer === true && isTrueLabel) || (q.answer === false && !isTrueLabel);
              if (shouldHighlight) {
                label.style.background = '#dcfce7';
                label.style.borderColor = '#4ade80';
              }
            }
          });
        } else if (q.type === 'checkbox') {
          const options = optionsEl.querySelectorAll('.option');
          options.forEach((label) => {
            const input = label.querySelector('input');
            if (!input) return;
            if (q.answer.includes(Number(input.value))) {
              label.style.background = '#dcfce7';
              label.style.borderColor = '#4ade80';
            }
          });
        }
      }
    });

    nextBtn.addEventListener('click', () => {
      if (!locked) return;
      current += 1;

      if (current >= questions.length) {
        quizSection.style.display = 'none';
        resultSection.style.display = 'block';
        score = questionResults.filter((v) => v === true).length;
        const pct = Math.round((score / questions.length) * 100);
        resultTitle.textContent = `You scored ${score} / ${questions.length} (${pct}%)`;

        if (pct >= 85) {
          resultText.textContent = 'Strong run. You are close to pit-ready electrical recall.';
        } else if (pct >= 65) {
          resultText.textContent = 'Solid start. Review the explanations on missed questions and retry.';
        } else {
          resultText.textContent = 'Keep practicing. Focus on battery thresholds, wire gauges, and CAN details.';
        }
        return;
      }

      renderQuestion();
    });

    restartBtn.addEventListener('click', () => {
      current = 0;
      score = 0;
      resultSection.style.display = 'none';
      quizSection.style.display = 'block';
      renderQuestion();
    });

    buildSidebar();
    renderQuestion();
  </script>
</body>
</html>
